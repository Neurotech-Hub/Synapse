<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Admin{% endblock %} — Synapse</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}"/>
</head>
<body class="admin">
  <nav class="admin-nav">
    <strong><a href="{{ url_for('admin.dashboard') }}">Synapse admin</a></strong>
    <a href="{{ url_for('admin.sources_list') }}">Sources</a>
    <a href="{{ url_for('admin.leads_list') }}">Leads</a>
    <a href="{{ url_for('admin.items_list') }}">Content items</a>
    <a href="{{ url_for('public.index') }}" target="_blank" rel="noopener">Public site</a>
    {% if current_user.is_authenticated %}
    <form method="post" action="{{ url_for('admin.logout') }}" class="inline-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <button type="submit" class="linkish">Sign out</button>
    </form>
    {% endif %}
  </nav>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block body %}{% endblock %}
</body>
</html>
