<script>
(function () {
  var rootSel = {{ (visit_url_root_selector or "")|tojson }};
  var urlName = {{ (visit_url_field_name or "url")|tojson }};
  var linkId = {{ (visit_link_id or "source-visit-link")|tojson }};
  var root = rootSel ? document.querySelector(rootSel) : document;
  var input = root.querySelector("input[name=" + JSON.stringify(urlName) + "]");
  var link = document.getElementById(linkId);
  if (!input || !link) return;
  function isHttpUrl(v) {
    return /^https?:\/\//i.test((v || "").trim());
  }
  function sync() {
    var v = (input.value || "").trim();
    if (isHttpUrl(v)) {
      link.setAttribute("href", v);
      link.removeAttribute("aria-disabled");
      link.classList.remove("visit-url-helper-link--inactive");
      link.title = v;
    } else {
      link.setAttribute("href", "#");
      link.setAttribute("aria-disabled", "true");
      link.classList.add("visit-url-helper-link--inactive");
      link.removeAttribute("title");
    }
  }
  link.addEventListener("click", function (e) {
    if (!isHttpUrl(input.value || "")) e.preventDefault();
  });
  input.addEventListener("input", sync);
  input.addEventListener("change", sync);
  sync();
})();
</script>
