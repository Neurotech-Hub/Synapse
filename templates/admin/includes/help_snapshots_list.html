<section class="admin-tip-sec">
  <h3 class="admin-tip-h">Snapshots</h3>
  <p class="admin-tip-p">For HTML monitors, each poll stores a SHA-256 of the fetched page. Identical bytes reuse the same snapshot; a new hash creates a new snapshot and usually a new content item. Run <strong>Poll now</strong> after the live page changes to see updates.</p>
</section>
