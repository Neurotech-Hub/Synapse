{% block title %}New source{% endblock %}
{% block body %}

  <h1>New source</h1>
</header>

<form method="post" class="admin-form">
{% include "admin/includes/source_fields.html" %}

<p class="admin-form-foot"><a href="{{ url_for('admin.sources_list') }}" class="back-link">&larr; Back to Sources</a></p>

{% include "admin/includes/source_visit_url_script.html" %}
{% endblock %}
