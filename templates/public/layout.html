<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Synapse{% endblock %} — Neurotech Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='public.css') }}"/>
  {% block head_extra %}{% endblock %}
</head>
<body class="public">
  <header class="site-head">
    <div class="site-head-inner site-head-inner--wide">
      <p class="brand-line">
        <a href="{{ url_for('public.index') }}" class="brand-link"><span class="brand-name">Synapse</span></a>
        <span class="brand-by-org">BY THE NEUROTECH HUB</span>
      </p>
      <nav class="public-nav" aria-label="Public sections">
        <a href="{{ url_for('public.index') }}" class="public-nav-link{% if nav_active == 'home' %} is-active{% endif %}">Home</a>
        <a href="{{ url_for('public.explore') }}" class="public-nav-link{% if nav_active == 'explore' %} is-active{% endif %}">Explore</a>
        <a href="{{ url_for('public.funding_list') }}" class="public-nav-link{% if nav_active == 'funding' %} is-active{% endif %}">Opportunities</a>
        <form method="get" action="{{ url_for('public.search') }}" class="public-nav-search" data-public-nav-search>
          <button type="button" class="public-nav-search-toggle" data-public-nav-search-toggle aria-label="Search">
            <svg class="public-nav-search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </button>
          <input name="q" class="public-nav-search-input" data-public-nav-search-input value="{{ q|default('') }}" placeholder="Search" autocomplete="off"/>
        </form>
      </nav>
    </div>
  </header>

  <main class="main-stack{% block main_mod %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='admin_dt_local.js') }}"></script>
  <script>
(function () {
  var root = document.querySelector("[data-public-nav-search]");
  if (!root) return;
  var toggle = root.querySelector("[data-public-nav-search-toggle]");
  var input = root.querySelector("[data-public-nav-search-input]");
  function openSearch() {
    root.classList.add("is-open");
    if (input) input.focus();
  }
  function closeSearch() {
    if (input && input.value.trim()) return;
    root.classList.remove("is-open");
  }
  if (toggle) toggle.addEventListener("click", openSearch);
  if (input) {
    input.addEventListener("focus", openSearch);
    input.addEventListener("blur", function () { setTimeout(closeSearch, 120); });
    input.addEventListener("keydown", function (ev) {
      if (ev.key === "Escape") {
        input.value = "";
        input.blur();
        closeSearch();
      }
    });
  }
})();
  </script>
  <footer class="site-foot">
    <nav class="foot-nav" aria-label="Footer">
      <a href="{{ url_for('admin.login') }}" class="foot-nav-link">Team sign-in</a>
      <span class="foot-nav-sep" aria-hidden="true">&bull;</span>
      <a href="mailto:gaidica@wustl.edu" class="foot-nav-link">Say Hello</a>
    </nav>
  </footer>
</body>
</html>
